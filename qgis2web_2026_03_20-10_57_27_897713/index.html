<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;

        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/TemperatureC_2.js"></script>
        <script src="data/NDVI_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[35.56516380860601,139.48914386920598],[35.777160233159634,139.84455637835435]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var layer_GoogleMaps_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleMaps_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
        });
        layer_GoogleMaps_0;
        map.addLayer(layer_GoogleMaps_0);
        map.createPane('pane_TKY_RGB_1');
        map.getPane('pane_TKY_RGB_1').style.zIndex = 401;
        var img_TKY_RGB_1 = 'data/TKY_RGB_1.png';
        var img_bounds_TKY_RGB_1 = [[35.39711167781334,139.23360605306235],[35.977403020002264,140.20962071372324]];
        var layer_TKY_RGB_1 = new L.imageOverlay(img_TKY_RGB_1,
                                              img_bounds_TKY_RGB_1,
                                              {pane: 'pane_TKY_RGB_1'});
        bounds_group.addLayer(layer_TKY_RGB_1);
        function pop_TemperatureC_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Temperatur</th>\
                        <td>' + (feature.properties['Temperatur'] !== null ? autolinker.link(String(feature.properties['Temperatur']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_TemperatureC_2_0(feature) {
            if (feature.properties['Temperatur'] >= 22.000000 && feature.properties['Temperatur'] <= 30.000000 ) {
                return {
                pane: 'pane_TemperatureC_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(43,131,186,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['Temperatur'] >= 30.000000 && feature.properties['Temperatur'] <= 31.000000 ) {
                return {
                pane: 'pane_TemperatureC_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(171,221,164,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['Temperatur'] >= 31.000000 && feature.properties['Temperatur'] <= 32.000000 ) {
                return {
                pane: 'pane_TemperatureC_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,191,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['Temperatur'] >= 32.000000 && feature.properties['Temperatur'] <= 33.000000 ) {
                return {
                pane: 'pane_TemperatureC_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(253,174,97,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['Temperatur'] >= 33.000000 && feature.properties['Temperatur'] <= 38.000000 ) {
                return {
                pane: 'pane_TemperatureC_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(215,25,28,1.0)',
                interactive: true,
            }
            }
        }
        map.createPane('pane_TemperatureC_2');
        map.getPane('pane_TemperatureC_2').style.zIndex = 402;
        map.getPane('pane_TemperatureC_2').style['mix-blend-mode'] = 'normal';
        var layer_TemperatureC_2 = new L.geoJson(json_TemperatureC_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_TemperatureC_2',
            layerName: 'layer_TemperatureC_2',
            pane: 'pane_TemperatureC_2',
            onEachFeature: pop_TemperatureC_2,
            style: style_TemperatureC_2_0,
        });
        bounds_group.addLayer(layer_TemperatureC_2);
        function pop_NDVI_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">NDVI</th>\
                        <td>' + (feature.properties['NDVI'] !== null ? autolinker.link(String(feature.properties['NDVI']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_NDVI_3_0(feature) {
            if (feature.properties['NDVI'] >= -1.000000 && feature.properties['NDVI'] <= 0.010000 ) {
                return {
                pane: 'pane_NDVI_3',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(166,206,227,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['NDVI'] >= 0.010000 && feature.properties['NDVI'] <= 1.000000 ) {
                return {
                pane: 'pane_NDVI_3',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(227,26,28,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['NDVI'] >= 1.000000 && feature.properties['NDVI'] <= 2.000000 ) {
                return {
                pane: 'pane_NDVI_3',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,170,43,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['NDVI'] >= 2.000000 && feature.properties['NDVI'] <= 3.000000 ) {
                return {
                pane: 'pane_NDVI_3',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(51,160,44,1.0)',
                interactive: true,
            }
            }
        }
        map.createPane('pane_NDVI_3');
        map.getPane('pane_NDVI_3').style.zIndex = 403;
        map.getPane('pane_NDVI_3').style['mix-blend-mode'] = 'normal';
        var layer_NDVI_3 = new L.geoJson(json_NDVI_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_NDVI_3',
            layerName: 'layer_NDVI_3',
            pane: 'pane_NDVI_3',
            onEachFeature: pop_NDVI_3,
            style: style_NDVI_3_0,
        });
        bounds_group.addLayer(layer_NDVI_3);
        var overlaysTree = [
            {label: 'NDVI<br /><table><tr><td style="text-align: center;"><img src="legend/NDVI_3_100.png" /></td><td>-1 - 0</td></tr><tr><td style="text-align: center;"><img src="legend/NDVI_3_011.png" /></td><td>0 - 1</td></tr><tr><td style="text-align: center;"><img src="legend/NDVI_3_122.png" /></td><td>1 - 2</td></tr><tr><td style="text-align: center;"><img src="legend/NDVI_3_233.png" /></td><td>2 - 3</td></tr></table>', layer: layer_NDVI_3},
            {label: 'TemperatureC<br /><table><tr><td style="text-align: center;"><img src="legend/TemperatureC_2_22300.png" /></td><td>22 - 30</td></tr><tr><td style="text-align: center;"><img src="legend/TemperatureC_2_30311.png" /></td><td>30 - 31</td></tr><tr><td style="text-align: center;"><img src="legend/TemperatureC_2_31322.png" /></td><td>31 - 32</td></tr><tr><td style="text-align: center;"><img src="legend/TemperatureC_2_32333.png" /></td><td>32 - 33</td></tr><tr><td style="text-align: center;"><img src="legend/TemperatureC_2_33384.png" /></td><td>33 - 38</td></tr></table>', layer: layer_TemperatureC_2},
            {label: "TKY_RGB", layer: layer_TKY_RGB_1},
            {label: "Google Maps", layer: layer_GoogleMaps_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        </script>        
    </body>
</html>
